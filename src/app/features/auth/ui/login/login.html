<p-card class="login-card">
  <ng-template #header>
    <div class="login-header">
      <span class="login-brand">Sales App</span>
      <p>Sign in to your account</p>
    </div>
  </ng-template>

  <div class="login-form">
    <div class="field">
      <label for="email">Email</label>
      <input pInputText id="email" type="email" placeholder="email@example.com" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <p-password id="password" placeholder="Password" [feedback]="false" [toggleMask]="true" />
    </div>

    <p-button label="Sign In" icon="pi pi-sign-in" styleClass="w-full" />
  </div>
</p-card>
