<p-toast/>

<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold">Categorías</h2>
    <div class="flex gap-2">
      <input pInputText placeholder="Buscar..." (input)="onSearch($event)"/>
      <p-button label="Nueva Categoría" icon="pi pi-plus" (onClick)="openCreate()"/>
    </div>
  </div>

  <p-table
    [value]="$categories()"
    [totalRecords]="$totalRecords()"
    [lazy]="true"
    [paginator]="true"
    [rows]="size"
    (onPage)="onPageChange($event)"
    stripedRows
  >
    <ng-template #header>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template #body let-category>
      <tr>
        <td>{{ category.name }}</td>
        <td>{{ category.description }}</td>
        <td>
          <i
            class="pi"
            [class.pi-check-circle]="category.isActive"
            [class.pi-times-circle]="!category.isActive"
          ></i>
        </td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="openEdit(category)"/>
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="delete(category)"/>
        </td>
      </tr>
    </ng-template>
    <ng-template #empty>
      <tr>
        <td colspan="4" class="text-center p-4">No hay categorías registradas</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="$dialogVisible()"
  (visibleChange)="$dialogVisible.set($event)"
  [header]="$selectedCategory() ? 'Editar Categoría' : 'Nueva Categoría'"
  [modal]="true"
  [style]="{ width: '480px' }"
>
  <app-category-form
    [category]="$selectedCategory()"
    (saved)="onSaved()"
    (cancelled)="onCancelled()"
  />
</p-dialog>
