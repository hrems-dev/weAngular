<p-toast />

<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="text-2xl font-bold">Ventas</h2>
    <div class="flex gap-2">
      <input pInputText placeholder="Buscar..." (input)="onSearch($event)" />
      <p-button label="Nueva Venta" icon="pi pi-plus" (onClick)="goToCreate()" />
    </div>
  </div>

  <p-table
    [value]="$sales()"
    [totalRecords]="$totalRecords()"
    [lazy]="true"
    [paginator]="true"
    [rows]="size"
    (onPage)="onPageChange($event)"
    stripedRows
  >
    <ng-template #header>
      <tr>
        <th>Fecha</th>
        <th>Cliente</th>
        <th>Total</th>
        <th>Items</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template #body let-sale>
      <tr>
        <td>{{ sale.sale_date }}</td>
        <td>{{ sale.clientName || sale.client_id }}</td>
        <td>{{ sale.total | currency: 'PEN' : 'symbol' : '1.2-2' : 'es-PE' }}</td>
        <td>{{ sale.items?.length || 0 }}</td>
        <td>
          <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="goToEdit(sale)" />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            (onClick)="delete(sale)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template #empty>
      <tr>
        <td colspan="5" class="text-center p-4">No hay ventas registradas</td>
      </tr>
    </ng-template>
  </p-table>
</div>
